<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Simulador Taylorista</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOPO -->
<div class="topo">
  <span>🏭 Simulador</span>
  <span id="money">💰 0</span>
</div>

<!-- PERFIL -->
<div class="perfil">
  <div id="cargo">Cargo: Operário</div>
</div>

<!-- HISTÓRIA -->
<div id="historia"></div>

<!-- AÇÕES = + = -->
<div id="acoes-container">
  <div id="opcoes-esquerda"></div>

  <div class="botao-centro">+</div>

  <div id="opcoes-direita"></div>
</div>

<!-- BARRAS -->
<div class="barras">

  <div class="blocoBarra">
    📈 Progresso
    <div class="barra"><div id="promoBar" class="progresso"></div></div>
  </div>

  <div class="blocoBarra">
    ⚙ Eficiência
    <div class="barra"><div id="eficienciaBar" class="progresso"></div></div>
  </div>

  <div class="blocoBarra">
    ❤️ Saúde
    <div class="barra"><div id="saudeBar" class="progresso"></div></div>
  </div>

  <div class="blocoBarra">
    🙂 Satisfação
    <div class="barra"><div id="satisfacaoBar" class="progresso"></div></div>
  </div>

  <div class="blocoBarra">
    🏢 Fábrica
    <div class="barra"><div id="empresaBar" class="progresso"></div></div>
  </div>

</div>

<!-- POPUP -->
<div id="popup" class="popup hidden">
  <div class="popup-content">
    <h3 id="popupTitulo"></h3>
    <p id="popupTexto"></p>
    <div id="popupOpcoes"></div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
