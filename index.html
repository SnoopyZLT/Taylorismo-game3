<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Taylorista</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOPO -->
<div class="topo">
  <div>🏭 Simulador Taylorista</div>
  <div>💰 R$ <span id="money">0</span></div>
</div>

<!-- CARGO -->
<div class="cargo-box">
  <div>
    Cargo: <span id="cargo">Operário</span> • 
    <span id="turno">Manhã</span>
  </div>

  <div class="barra">
    <div id="barraCargo" class="barra-fill"></div>
  </div>
  <span id="cargoPorcento">0%</span>
</div>

<!-- RELATÓRIO -->
<div class="relatorio">
  <div class="titulo">📋 Relatório</div>
  <div id="log" class="log"></div>
</div>

<!-- BOTÕES -->
<div class="botoes">
  <button onclick="trabalhar()" class="btn trabalhar">🔧 Trabalhar</button>
  <button onclick="descansar()" class="btn descansar">😴 Descansar</button>

  <button onclick="arriscar()" class="btn arriscar">🎲 Arriscar</button>
  <button onclick="abrirFabrica()" id="btnFabrica" class="btn fabrica" disabled>🏭 Fábrica</button>
</div>

<!-- BOTÃO CENTRAL -->
<button onclick="pularDia()" class="btn grande">➕ Pular Dia</button>

<!-- STATUS -->
<div class="status">

  <div class="status-item">
    ⚙️ Eficiência <span id="eficienciaTxt">50%</span>
    <div class="barra">
      <div id="eficienciaBar" class="barra-fill azul"></div>
    </div>
  </div>

  <div class="status-item">
    ❤️ Saúde <span id="saudeTxt">80%</span>
    <div class="barra">
      <div id="saudeBar" class="barra-fill vermelho"></div>
    </div>
  </div>

  <div class="status-item">
    🙂 Satisfação <span id="satisfacaoTxt">60%</span>
    <div class="barra">
      <div id="satisfacaoBar" class="barra-fill amarelo"></div>
    </div>
  </div>

  <div class="status-item">
    🏭 Fábrica <span id="fabricaTxt">0%</span>
    <div class="barra">
      <div id="fabricaBar" class="barra-fill cinza"></div>
    </div>
  </div>

</div>

<!-- POPUP DINÂMICO -->
<div id="popup" class="popup hidden">
  <div class="popup-box">
    <h2 id="popupTitulo"></h2>
    <p id="popupTexto"></p>
    <button onclick="fecharPopup()">OK</button>
  </div>
</div>

<script src="script.js"></script>

</body>
  </html>
