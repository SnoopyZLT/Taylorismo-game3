<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Taylorista</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOPO -->
<div class="topo">
  <span>🏭 Simulador Taylorista</span>
  <span id="dinheiro">💰 0</span>
</div>

<!-- CARGO + PROGRESSO -->
<div class="cargo-box">
  <div id="cargo">Cargo: Operário</div>
  <div class="barra">
    <div id="barraCargo" class="fill"></div>
    <span id="txtCargo">0%</span>
  </div>
</div>

<!-- HISTÓRIA -->
<div id="historico" class="historico"></div>

<!-- BOTÕES -->
<div class="acoes">

  <button onclick="trabalhar()">🔧 Trabalhar</button>
  <button onclick="descansar()">😴 Descansar</button>

  <div class="linha-centro">
    <button onclick="arriscar()">🎲 Arriscar</button>

    <!-- BOTÃO + -->
    <button id="btnDia" class="botao-plus" onclick="passarDia()">+</button>

    <button id="btnFabrica" onclick="abrirFabrica()" disabled>🏭 Fábrica</button>
  </div>

</div>

<!-- BARRAS (AGORA EMBAIXO) -->
<div class="barras">

  <div class="barra">
    <span>⚙️ Eficiência</span>
    <div><div id="eficiencia" class="fill"></div></div>
  </div>

  <div class="barra">
    <span>❤️ Saúde</span>
    <div><div id="saude" class="fill"></div></div>
  </div>

  <div class="barra">
    <span>🙂 Satisfação</span>
    <div><div id="satisfacao" class="fill"></div></div>
  </div>

  <div class="barra">
    <span>🏭 Fábrica</span>
    <div><div id="fabrica" class="fill"></div></div>
  </div>

</div>

<!-- POP-UP EVENTO -->
<div id="popupEvento" class="popup hidden">
  <div class="popup-box">
    <h2>⚠ Evento</h2>
    <p id="eventoTexto"></p>

    <div class="popup-opcoes">
      <button onclick="resolverEvento()">Resolver</button>
      <button onclick="ignorarEvento()">Ignorar</button>
    </div>
  </div>
</div>

<!-- POP-UP FÁBRICA -->
<div id="popupFabrica" class="popup hidden">
  <div class="popup-box">
    <h2>🏭 Gestão da Fábrica</h2>

    <button onclick="melhorarMaquinas()">⚙ Melhorar máquinas (💰 200)</button>
    <button onclick="contratarFuncionarios()">👷 Contratar funcionários (💰 150)</button>
    <button onclick="marketing()">📢 Investir em marketing (💰 250)</button>

    <br><br>
    <button onclick="fecharPopup()">Fechar</button>
  </div>
</div>

<!-- POP-UP FINAL -->
<div id="popupFinal" class="popup hidden">
  <div class="popup-box">
    <h2 id="finalTitulo"></h2>
    <p id="finalTexto"></p>

    <button onclick="reiniciarJogo()">Reiniciar</button>
  </div>
</div>

<script src="script.js"></script>

</body>
      </html>
