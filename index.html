<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Taylorista</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1e3a;
    color:white;
}

/* TOPO */
.topo{
    background:#2f6de0;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

/* CONTAINER */
.container{
    padding:15px;
}

/* BARRAS */
.barra{
    background:#222;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:10px;
    border:2px solid black;
}
.fill{
    height:15px;
    width:0%;
    transition:0.5s;
}

/* CORES */
.eficiencia{background:#4da6ff;}
.saude{background:#ff4d4d;}
.satisfacao{background:#ffd633;}
.fabrica{background:#999;}
.cargo{background:gold;}

/* BOTÕES */
.botoes{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:15px;
}

button{
    padding:15px;
    border:none;
    border-radius:10px;
    font-size:16px;
    color:white;
    cursor:pointer;
    transition:0.2s;
}

button:active{
    transform:scale(0.95);
}

.trabalhar{background:#2f6de0;}
.descansar{background:#2ecc71;}
.arriscar{background:#ff6600;}
.proximo{background:#5a7dff;grid-column:span 2;}

/* RELATÓRIO */
.relatorio{
    background:black;
    padding:10px;
    height:150px;
    overflow-y:auto;
    border-radius:10px;
    border:2px solid black;
}

/* POPUP */
.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#1c2e4a;
    padding:20px;
    border-radius:15px;
    display:none;
    text-align:center;
}

.popup button{
    margin-top:10px;
    background:#2f6de0;
}
</style>
</head>

<body>

<div class="topo">
    <div>🏭 Simulador Taylorista</div>
    <div id="dinheiro">R$ 0</div>
</div>

<div class="container">

<h3 id="cargoTxt">Cargo: Operário</h3>

<div class="barra">
    <div id="barraCargo" class="fill cargo"></div>
</div>

<div class="relatorio" id="relatorio"></div>

<div class="botoes">
    <button class="trabalhar" onclick="acao('trabalhar')">🔧 Trabalhar</button>
    <button class="descansar" onclick="acao('descansar')">😴 Descansar</button>
    <button class="arriscar" onclick="acao('arriscar')">🎲 Arriscar</button>
    <button class="proximo" onclick="pularDia()">➕ Próximo Dia</button>
</div>

<h4>⚙️ Eficiência</h4>
<div class="barra"><div id="eficiencia" class="fill eficiencia"></div></div>

<h4>❤️ Saúde</h4>
<div class="barra"><div id="saude" class="fill saude"></div></div>

<h4>😊 Satisfação</h4>
<div class="barra"><div id="satisfacao" class="fill satisfacao"></div></div>

<h4>🏭 Fábrica</h4>
<div class="barra"><div id="fabrica" class="fill fabrica"></div></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div id="popupText"></div>
    <button onclick="fecharPopup()">OK</button>
</div>

<script>

/* ESTADO */
let dinheiro = 0;
let eficiencia = 50;
let saude = 50;
let satisfacao = 50;
let fabrica = 0;
let cargoXP = 0;
let cargo = "Operário";

let dia = 1;
let turno = "Manhã";

/* LIMITADOR */
function limite(valor){
    return Math.max(0, Math.min(100, valor));
}

/* ATUALIZA UI */
function atualizar(){
    eficiencia = limite(eficiencia);
    saude = limite(saude);
    satisfacao = limite(satisfacao);
    fabrica = limite(fabrica);
    cargoXP = limite(cargoXP);

    document.getElementById("eficiencia").style.width = eficiencia+"%";
    document.getElementById("saude").style.width = saude+"%";
    document.getElementById("satisfacao").style.width = satisfacao+"%";
    document.getElementById("fabrica").style.width = fabrica+"%";
    document.getElementById("barraCargo").style.width = cargoXP+"%";

    document.getElementById("dinheiro").innerText = "R$ "+dinheiro;
    document.getElementById("cargoTxt").innerText = "Cargo: "+cargo+" • "+turno;

    verificarFim();
}

/* RELATÓRIO */
function log(txt){
    let r = document.getElementById("relatorio");
    r.innerHTML += "<p>"+txt+"</p>";
    r.scrollTop = r.scrollHeight;
}

/* POPUP */
function popup(txt){
    document.getElementById("popupText").innerText = txt;
    document.getElementById("popup").style.display="block";
}

function fecharPopup(){
    document.getElementById("popup").style.display="none";
}

/* AÇÕES */
function acao(tipo){

    if(tipo==="trabalhar"){
        dinheiro+=3;
        eficiencia+=10;
        saude-=10;
        satisfacao-=10;
        cargoXP+=10;

        log("Você trabalhou.");
    }

    if(tipo==="descansar"){
        dinheiro-=5;
        eficiencia-=10;
        saude+=20;
        satisfacao+=20;

        log("Você descansou.");
    }

    if(tipo==="arriscar"){
        let sorte=Math.random();
        if(sorte>0.5){
            dinheiro+=10;
            eficiencia+=5;
            log("Você ganhou!");
        }else{
            dinheiro-=10;
            eficiencia-=5;
            log("Você perdeu!");
        }
    }

    avancarTurno();
}

/* TURNOS */
function avancarTurno(){
    popup("Dia "+dia+" / Turno "+turno);

    if(turno==="Manhã"){
        turno="Tarde";
    }else{
        turno="Manhã";
        dia++;
    }

    atualizar();
}

/* PULAR DIA */
function pularDia(){
    popup("Dia "+dia+" → Dia "+(dia+1));
    dia++;
    turno="Manhã";
    atualizar();
}

/* PROGRESSÃO */
function verificarFim(){

    if(eficiencia<=0 || saude<=0 || satisfacao<=0){
        popup("❌ Você foi demitido!");
    }

    if(dinheiro < -50){
        popup("💸 Falência!");
    }

    if(cargoXP>=100 && cargo!=="Dono"){
        cargo="Dono";
        cargoXP=100;
        document.getElementById("barraCargo").style.background="gold";
        popup("👑 Você virou DONO!");
    }
}

atualizar();

</script>

</body>
                     </html>
