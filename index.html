<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Taylorista</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOPO -->
<div class="topo">
  🏭 Simulador Taylorista
  <span id="money">💰 0</span>
</div>

<!-- CARGO -->
<div class="cargo-box">
  <div>Cargo: <span id="cargo">Operário</span></div>
  <div class="barra">
    <div id="barraCargo"></div>
  </div>
</div>

<!-- HISTÓRICO -->
<div id="log" class="log"></div>

<!-- BOTÕES -->
<div class="botoes">
  <button onclick="trabalhar()">🔧 Trabalhar</button>
  <button onclick="descansar()">😴 Descansar</button>

  <div class="linha-centro">
    <button onclick="arriscar()">🎲 Arriscar</button>
    <button class="btn-plus" onclick="passarDia()">+</button>
    <button id="btnFabrica" onclick="abrirFabrica()" disabled>🏭 Fábrica</button>
  </div>
</div>

<!-- BARRAS -->
<div class="barras">
  <div class="barra"><span>⚙️ Eficiência</span><div id="eficiencia"></div></div>
  <div class="barra"><span>❤️ Saúde</span><div id="saude"></div></div>
  <div class="barra"><span>🙂 Satisfação</span><div id="satisfacao"></div></div>
  <div class="barra"><span>🏭 Fábrica</span><div id="fabricaBar"></div></div>
</div>

<!-- POPUP -->
<div id="popupOverlay">
  <div class="popup">
    <h2 id="popupTitle"></h2>
    <p id="popupText"></p>
    <button id="btn1" class="btn-positive"></button>
    <button id="btn2" class="btn-negative"></button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
