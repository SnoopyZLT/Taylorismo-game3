<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Taylorista</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#0b1e3a;
    color:white;
}

/* RESPONSIVO */
.container{
    max-width:500px;
    margin:auto;
    padding:15px;
}

/* TOPO */
.topo{
    background:#2f6de0;
    padding:15px;
    display:flex;
    justify-content:space-between;
}

/* RELATÓRIO */
.relatorio{
    background:black;
    padding:10px;
    height:180px;
    overflow-y:auto;
    border-radius:12px;
    border:2px solid black;
    margin-bottom:15px;
}

/* BARRAS */
.barra{
    background:#222;
    border-radius:10px;
    overflow:hidden;
    margin-bottom:10px;
    border:2px solid black;
}
.fill{
    height:14px;
    width:0%;
    transition:0.4s;
    text-align:right;
    padding-right:5px;
    font-size:12px;
}

/* CORES */
.eficiencia{background:#4da6ff;}
.saude{background:#ff4d4d;}
.satisfacao{background:#ffd633;}
.fabrica{background:#888;}
.cargo{background:#4da6ff;}

/* BOTÕES */
.botoes{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-bottom:15px;
}

button{
    padding:14px;
    border:none;
    border-radius:12px;
    font-size:15px;
    color:white;
    cursor:pointer;
    transition:0.2s;
}

button:active{
    transform:scale(0.95);
}

.trabalhar{background:#2f6de0;}
.descansar{background:#2ecc71;}
.arriscar{background:#ff6600;}
.fabricaBtn{background:#8e44ad;}
.proximo{background:#5a7dff;grid-column:span 2;}

/* POPUP */
.popup{
    position:fixed;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    background:#1c2e4a;
    padding:20px;
    border-radius:15px;
    display:none;
    width:85%;
    max-width:350px;
    text-align:center;
}

.popup button{
    margin-top:10px;
    width:100%;
}
</style>
</head>

<body>

<div class="topo">
    <div>🏭 Simulador Taylorista</div>
    <div id="dinheiro">R$ 0</div>
</div>

<div class="container">

<h3 id="cargoTxt"></h3>

<div class="barra">
    <div id="barraCargo" class="fill cargo"></div>
</div>

<div class="relatorio" id="relatorio"></div>

<div class="botoes">
    <button class="trabalhar" onclick="acao('trabalhar')">🔧 Trabalhar</button>
    <button class="descansar" onclick="acao('descansar')">😴 Descansar</button>
    <button class="arriscar" onclick="acao('arriscar')">🎲 Arriscar</button>
    <button id="btnFabrica" class="fabricaBtn" onclick="abrirFabrica()" disabled>🏭 Gerenciar</button>
    <button class="proximo" onclick="pularDia()">➕ Próximo Dia</button>
</div>

<h4>⚙️ Eficiência</h4>
<div class="barra"><div id="eficiencia" class="fill eficiencia"></div></div>

<h4>❤️ Saúde</h4>
<div class="barra"><div id="saude" class="fill saude"></div></div>

<h4>😊 Satisfação</h4>
<div class="barra"><div id="satisfacao" class="fill satisfacao"></div></div>

<h4>🏭 Fábrica</h4>
<div class="barra"><div id="fabrica" class="fill fabrica"></div></div>

</div>

<!-- POPUP -->
<div class="popup" id="popup">
    <div id="popupText"></div>
    <div id="popupBtns"></div>
</div>

<script>

/* ESTADO */
let dinheiro = 0;
let eficiencia = 15; // ✔ corrigido
let saude = 50;
let satisfacao = 50;
let fabrica = 0;

let cargoXP = 0;
let cargoNivel = 0;
let cargos = ["Operário","Supervisor","Gerente","Dono"];

let dia = 1;
let turno = "Manhã";
let jogoAtivo = true;

/* LIMITADOR */
function limite(v){ return Math.max(0, Math.min(100, v)); }

/* UI */
function atualizar(){

    eficiencia = limite(eficiencia);
    saude = limite(saude);
    satisfacao = limite(satisfacao);
    fabrica = limite(fabrica);
    cargoXP = limite(cargoXP);

    // BARRAS %
    document.getElementById("eficiencia").style.width = eficiencia+"%";
    document.getElementById("eficiencia").innerText = eficiencia+"%";

    document.getElementById("saude").style.width = saude+"%";
    document.getElementById("saude").innerText = saude+"%";

    document.getElementById("satisfacao").style.width = satisfacao+"%";
    document.getElementById("satisfacao").innerText = satisfacao+"%";

    document.getElementById("fabrica").style.width = fabrica+"%";
    document.getElementById("fabrica").innerText = fabrica+"%";

    document.getElementById("barraCargo").style.width = cargoXP+"%";
    document.getElementById("barraCargo").innerText = cargoXP+"%";

    document.getElementById("dinheiro").innerText = "R$ "+dinheiro;

    document.getElementById("cargoTxt").innerText =
    "Cargo: "+cargos[cargoNivel]+" • Dia "+dia+" ("+turno+")";

    if(cargoNivel >= 2){
        document.getElementById("btnFabrica").disabled = false;
    }

    verificarFim();
}

/* RELATÓRIO */
function log(txt){
    let r = document.getElementById("relatorio");
    r.innerHTML += "<p>"+txt+"</p>";
    r.scrollTop = r.scrollHeight;
}

/* POPUP MELHORADO */
function popup(txt, opcoes=[]){

    let btns = "";

    opcoes.forEach(op=>{
        btns += `<button onclick="${op.acao}">${op.nome}</button>`;
    });

    if(btns === ""){
        btns = `<button onclick="fecharPopup()">OK</button>`;
    }

    document.getElementById("popupText").innerHTML = txt;
    document.getElementById("popupBtns").innerHTML = btns;
    document.getElementById("popup").style.display="block";
}

function fecharPopup(){
    document.getElementById("popup").style.display="none";
}

/* AÇÕES */
function acao(tipo){

    if(!jogoAtivo) return;

    if(tipo==="trabalhar"){
        dinheiro += (cargoNivel+1)*3;
        eficiencia += 10;
        saude -= 10;
        satisfacao -= 10;
        cargoXP += 20; // 🔥 mais rápido subir
        log("🔧 Você trabalhou.");
    }

    if(tipo==="descansar"){
        dinheiro -= 5;
        eficiencia -= 10;
        saude += 20;
        satisfacao += 20;
        log("😴 Você descansou.");
    }

    if(tipo==="arriscar"){
        if(Math.random()>0.5){
            dinheiro += 20;
            log("🎲 Você ganhou dinheiro!");
        }else{
            dinheiro -= 15;
            log("🎲 Você perdeu dinheiro!");
        }
    }

    subirCargo(); // 🔥 CORREÇÃO PRINCIPAL
    eventoAleatorio();
    avancarTurno();
}

/* PROMOÇÃO */
function subirCargo(){
    if(cargoXP>=100 && cargoNivel<3){
        cargoXP=0;
        cargoNivel++;

        popup("📈 PROMOÇÃO!<br>Agora você é <b>"+cargos[cargoNivel]+"</b>",[
            {nome:"Continuar",acao:"fecharPopup()"}
        ]);

        if(cargoNivel===3){
            document.getElementById("barraCargo").style.background="gold";
            document.getElementById("barraCargo").innerText="👑DONO👑";
        }
    }
}

/* EVENTOS */
function eventoAleatorio(){
    if(Math.random()<0.3){
        popup("⚠️ Problema na fábrica!",[
            {nome:"Resolver (-R$10 +Eficiência)",acao:"resolver()"},
            {nome:"Ignorar (-Eficiência)",acao:"ignorar()"}
        ]);
    }
}

function resolver(){
    dinheiro -= 10;
    eficiencia += 10;
    fecharPopup();
}

function ignorar(){
    eficiencia -= 10;
    fecharPopup();
}

/* FÁBRICA */
function abrirFabrica(){
    popup("🏭 Melhorias:",[
        {nome:"Máquinas (-R$20 +10%)",acao:"upgrade(20,10)"},
        {nome:"Funcionários (-R$30 +15%)",acao:"upgrade(30,15)"}
    ]);
}

function upgrade(custo, ganho){
    if(dinheiro>=custo){
        dinheiro -= custo;
        fabrica += ganho;
    }
    fecharPopup();
}

/* TURNOS */
function avancarTurno(){

    log("📅 Dia "+dia+" / "+turno);

    if(turno==="Manhã") turno="Tarde";
    else{ turno="Manhã"; dia++; }

    atualizar();
}

/* PULAR DIA */
function pularDia(){
    log("⏩ Dia "+dia+" → "+(dia+1));
    dia++;
    turno="Manhã";
    atualizar();
}

/* FIM COM BOTÃO */
function verificarFim(){

    if(!jogoAtivo) return;

    if(eficiencia<=0 || saude<=0 || satisfacao<=0){
        jogoAtivo=false;
        popup("❌ Você foi demitido!",[
            {nome:"Recomeçar",acao:"restart()"}
        ]);
    }

    if(dinheiro<-50){
        jogoAtivo=false;
        popup("💸 Falência!",[
            {nome:"Recomeçar",acao:"restart()"}
        ]);
    }

    if(fabrica>=100){
        jogoAtivo=false;
        popup("🏆 Sua fábrica virou um sucesso!",[
            {nome:"Recomeçar",acao:"restart()"}
        ]);
    }
}

function restart(){
    location.reload();
}

/* TUTORIAL MELHORADO */
window.onload = () =>{
    popup(
    "📘 COMO JOGAR<br><br>"+
    "🔧 Trabalhe → ganha dinheiro<br>"+
    "😴 Descanse → recupera<br>"+
    "🎲 Arrisque → risco/recompensa<br><br>"+
    "⚠️ Não deixe barras zerarem<br>"+
    "👑 Vire DONO!",
    [{nome:"Começar",acao:"fecharPopup()"}]
    );

    atualizar();
}

</script>

</body>
    </html>
