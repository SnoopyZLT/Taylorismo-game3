<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Taylorista</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

  <!-- TOPO -->
  <div class="topo">
    🏭 Simulador Taylorista 💰 <span id="money">0</span>
  </div>

  <!-- CARGO -->
  <div class="cargo-box">
    <div id="cargoTexto">Cargo: Operário</div>
    <div class="barra cargo">
      <div id="barraCargo"></div>
      <span id="cargoPercent">0%</span>
    </div>
    <div id="diaTurno">Dia 1 - Manhã</div>
  </div>

  <!-- LOG -->
  <div id="log"></div>

  <!-- BOTÕES -->
  <div class="botoes">

    <button onclick="trabalhar()">🔧 Trabalhar</button>
    <button onclick="descansar()">😴 Descansar</button>

    <button id="btnPassar" onclick="passarTurno()">+</button>

    <button onclick="arriscar()">🎲 Arriscar</button>
    <button id="btnFabrica" onclick="abrirFabrica()" disabled>🏭 Fábrica</button>

  </div>

  <!-- BARRAS -->
  <div class="barras">

    <div class="barra">
      <div id="eficienciaBar"></div>
      <span>⚙️ Eficiência</span>
    </div>

    <div class="barra">
      <div id="saudeBar"></div>
      <span>❤️ Saúde</span>
    </div>

    <div class="barra">
      <div id="satisfacaoBar"></div>
      <span>🙂 Satisfação</span>
    </div>

    <div class="barra">
      <div id="fabricaBar"></div>
      <span>🏭 Fábrica</span>
    </div>

  </div>

</div>

<!-- POPUP -->
<div id="popupOverlay">
  <div class="popup">
    <h3 id="popupTitulo"></h3>
    <p id="popupTexto"></p>
    <button onclick="fecharPopup()">OK</button>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
