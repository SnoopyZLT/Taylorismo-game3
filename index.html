<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Taylorista</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOPO -->
<div class="topo">
  🏭 Simulador Taylorista
  <span id="dinheiro">💰 0</span>
</div>

<!-- CARGO -->
<div class="cargo-box">
  <span id="cargo">Cargo: Operário</span>
  <div class="barra">
    <div id="barraCargo" class="fill"></div>
    <span id="txtCargo">0%</span>
  </div>
</div>

<!-- HISTÓRICO -->
<div id="log" class="log"></div>

<!-- BOTÕES -->
<div class="acoes">

  <div class="linha">
    <button onclick="trabalhar()">🔧 Trabalhar</button>
    <button onclick="descansar()">😴 Descansar</button>
  </div>

  <div class="linha-centro">
    <button onclick="arriscar()">🎲 Arriscar</button>

    <button class="plus" onclick="passarDia()">+</button>

    <button id="btn-fabrica" onclick="abrirFabrica()">🏭 Fábrica</button>
  </div>

</div>

<!-- BARRAS -->
<div class="barras">

  <div class="barra">
    <span>⚙️ Eficiência</span>
    <div class="bg"><div id="eficiencia-bar" class="fill"></div></div>
  </div>

  <div class="barra">
    <span>❤️ Saúde</span>
    <div class="bg"><div id="saude-bar" class="fill"></div></div>
  </div>

  <div class="barra">
    <span>🙂 Satisfação</span>
    <div class="bg"><div id="satisfacao-bar" class="fill"></div></div>
  </div>

  <div class="barra">
    <span>🏭 Fábrica</span>
    <div class="bg"><div id="fabrica-bar" class="fill"></div></div>
  </div>

</div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">
    <p id="popup-texto"></p>
    <button id="btn1"></button>
    <button id="btn2"></button>
  </div>
</div>

<script src="script.js"></script>
</body>
                                                               </html>
