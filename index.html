<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Taylorista</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  🏭 Simulador Taylorista
  <span id="money">R$ 0</span>
</header>

<div class="container">

  <!-- CARGO -->
  <div class="cargo-box">
    <div id="cargoTexto">Cargo: Operário • Manhã</div>
    <div class="barra">
      <div id="cargoBarra"></div>
    </div>
    <span id="cargoPorcentagem">0%</span>
  </div>

  <!-- RELATÓRIO -->
  <div class="relatorio" id="relatorio"></div>

  <!-- BOTÕES -->
  <div class="botoes">
    <button onclick="trabalhar()">🔧 Trabalhar</button>
    <button onclick="descansar()">😴 Descansar</button>
    <button onclick="arriscar()">🎲 Arriscar</button>
    <button id="btnFabrica" onclick="abrirFabrica()" disabled>🏭 Gerenciar</button>
  </div>

  <button class="proximo" onclick="proximoDia()">➕ Próximo Dia</button>

  <!-- BARRAS -->
  <div class="status">
    <p>⚙️ Eficiência <span id="efTxt">50%</span></p>
    <div class="barra"><div id="ef"></div></div>

    <p>❤️ Saúde <span id="saTxt">80%</span></p>
    <div class="barra"><div id="sa"></div></div>

    <p>🙂 Satisfação <span id="stTxt">60%</span></p>
    <div class="barra"><div id="st"></div></div>

    <p>🏭 Fábrica <span id="faTxt">0%</span></p>
    <div class="barra"><div id="fa"></div></div>
  </div>

</div>

<!-- POPUP -->
<div id="popup" class="popup hidden">
  <div class="popup-box">
    <h2 id="popupTitulo"></h2>
    <p id="popupTexto"></p>
    <div id="popupBtns"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
