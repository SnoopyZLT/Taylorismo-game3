<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Taylorista</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- TOPO -->
<header>
  🏭 Simulador Taylorista
  <span>💰 R$ <span id="money">0</span></span>
</header>

<!-- CARGO -->
<div class="cargo-box">
  <div id="cargoTexto">Cargo: Operário • Manhã</div>
  <div class="barra">
    <div id="cargoBar" class="fill"></div>
    <span id="cargoPct">0%</span>
  </div>
</div>

<!-- RELATÓRIO -->
<div class="relatorio">
  <h3>📋 Relatório</h3>
  <div id="log"></div>
</div>

<!-- BOTÕES -->
<div class="botoes">
  <button onclick="acao('trabalhar')" class="azul">🔧 Trabalhar</button>
  <button onclick="acao('descansar')" class="verde">😴 Descansar</button>
  <button onclick="acao('arriscar')" class="laranja">🎲 Arriscar</button>
  <button onclick="abrirFabrica()" id="btnFabrica" class="roxo" disabled>🏭 Fábrica</button>
</div>

<button onclick="pularDia()" class="grande">➕ Próximo Dia</button>

<!-- STATUS -->
<div class="status">

  <div class="stat">
    ⚙️ Eficiência
    <div class="barra"><div id="ef" class="fill azul"></div></div>
  </div>

  <div class="stat">
    ❤️ Saúde
    <div class="barra"><div id="sd" class="fill vermelho"></div></div>
  </div>

  <div class="stat">
    🙂 Satisfação
    <div class="barra"><div id="st" class="fill amarelo"></div></div>
  </div>

  <div class="stat">
    🏭 Fábrica
    <div class="barra"><div id="fb" class="fill cinza"></div></div>
  </div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
