<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Taylorista</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOPO -->
<div class="topo">
    <div>🏭 Simulador Taylorista</div>
    <div>💰 R$ <span id="money">0</span></div>
</div>

<!-- CARGO -->
<div class="cargo-box">
    <div>Cargo: Operário • Manhã</div>
    <div class="barra">
        <div class="barra-fill" style="width:0%"></div>
        <span class="barra-text">0%</span>
    </div>
</div>

<!-- RELATÓRIO -->
<div class="relatorio">
    <div class="relatorio-titulo">📋 Relatório do Dia</div>
    <div class="log">
        <p>📌 Você começou como operário.</p>
    </div>
</div>

<!-- BOTÕES -->
<div class="botoes">
    <button class="btn azul">🔧 Trabalhar</button>
    <button class="btn verde">😴 Descansar</button>
    <button class="btn laranja">🎲 Arriscar</button>
    <button class="btn roxo">🏭 Gerenciar</button>
</div>

<!-- PULAR DIA -->
<button class="btn grande">➕ Próximo Dia</button>

<!-- STATUS -->
<div class="status">

    <div class="status-item">
        ⚙️ Eficiência
        <div class="barra">
            <div class="barra-fill azul" style="width:20%"></div>
        </div>
    </div>

    <div class="status-item">
        ❤️ Saúde
        <div class="barra">
            <div class="barra-fill vermelho" style="width:80%"></div>
        </div>
    </div>

    <div class="status-item">
        🙂 Satisfação
        <div class="barra">
            <div class="barra-fill amarelo" style="width:60%"></div>
        </div>
    </div>

    <div class="status-item">
        🏭 Fábrica
        <div class="barra">
            <div class="barra-fill cinza" style="width:0%"></div>
        </div>
    </div>

</div>

</body>
</html>
