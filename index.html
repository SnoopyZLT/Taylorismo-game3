<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Simulador Taylorista</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOPO -->
<div class="topo">
  <div class="menu">☰</div>
  <div class="logo">🏭 Simulador</div>
  <div class="dinheiro">💰 <span id="money">0</span></div>
</div>

<!-- INFO JOGADOR -->
<div class="perfil">
  <div class="nome">Operário Taylorista</div>
  <div class="sub">Fábrica • <span id="cargo"></span></div>
</div>

<!-- HISTÓRIA (CENTRO PRINCIPAL) -->
<div id="historia"></div>

<!-- BOTÃO CENTRAL -->
<div class="botao-centro" onclick="proximoDia()">
  +
</div>

<!-- BARRAS -->
<div class="barras">
  <div>⚙️ Eficiência <div class="barra"><div id="eficienciaBar" class="progresso"></div></div></div>
  <div>❤️ Saúde <div class="barra"><div id="saudeBar" class="progresso"></div></div></div>
  <div>😐 Satisfação <div class="barra"><div id="satisfacaoBar" class="progresso"></div></div></div>
</div>

<!-- OPÇÕES -->
<div id="opcoes" class="opcoes"></div>

<!-- POPUP -->
<div id="popup" class="popup hidden">
  <div class="popup-content">
    <h2 id="popupTitulo"></h2>
    <p id="popupTexto"></p>
    <div id="popupOpcoes"></div>
  </div>
</div>

<script src="script.js"></script>

</body>
  </html>
