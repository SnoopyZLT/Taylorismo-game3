<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Taylorista</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  🏭 Simulador Taylorista
  <span id="infoTempo">Dia 1 - Manhã</span>
</header>

<div class="container">

  <!-- STATUS -->
  <div class="status">

    <div>💰 Dinheiro: <span id="money">0</span></div>

    <div class="barra"><div id="energia"></div><span>⚡ Energia</span></div>
    <div class="barra"><div id="estresse"></div><span>😵 Estresse</span></div>
    <div class="barra"><div id="eficiencia"></div><span>📈 Eficiência</span></div>
    <div class="barra"><div id="saude"></div><span>❤️ Saúde</span></div>
    <div class="barra"><div id="satisfacao"></div><span>😊 Satisfação</span></div>

    <!-- CARGO -->
    <div class="barra cargo">
      <div id="cargoBar"></div>
      <span id="cargoTxt">Operário</span>
    </div>

  </div>

  <!-- AÇÕES -->
  <div class="botoes">
    <button class="trabalhar" onclick="acao('trabalhar')">Trabalhar</button>
    <button class="descansar" onclick="acao('descansar')">Descansar</button>
    <button class="investir" onclick="acao('investir')">Investir</button>
  </div>

</div>

<!-- POPUP -->
<div id="popup" class="popup hidden">
  <div class="popup-box">
    <h2 id="popupTitulo"></h2>
    <p id="popupTexto"></p>
    <button onclick="fecharPopup()">OK</button>
  </div>
</div>

<script src="script.js"></script>
</body>
  </html>
