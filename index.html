<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Taylorista</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOPO -->
<div class="topo">
    🏭 Simulador Taylorista
    <span id="dinheiro">💰 0</span>
</div>

<div class="cargo">
    <span id="cargo">Cargo: Operário (0%)</span>
</div>

<!-- HISTÓRICO -->
<div id="log" class="log"></div>

<!-- BOTÕES -->
<div class="acoes">
    <button onclick="trabalhar()">🔧 Trabalhar</button>
    <button onclick="descansar()">😴 Descansar</button>
</div>

<div class="acoes">
    <button onclick="arriscar()">🎲 Arriscar</button>
    <button id="btn-fabrica" onclick="abrirFabrica()">🏭 Fábrica</button>
</div>

<!-- BOTÃO + -->
<div class="center">
    <button class="btn-plus" onclick="passarDia()">+</button>
</div>

<!-- BARRAS -->
<div class="barras">
    <div class="barra">
        <div id="eficiencia-bar">50%</div>
        <span>⚙️ Eficiência</span>
    </div>

    <div class="barra">
        <div id="saude-bar">80%</div>
        <span>❤️ Saúde</span>
    </div>

    <div class="barra">
        <div id="satisfacao-bar">60%</div>
        <span>🙂 Satisfação</span>
    </div>

    <div class="barra">
        <div id="fabrica-bar">0%</div>
        <span>🏭 Fábrica</span>
    </div>
</div>

<!-- POPUP -->
<div id="popup" class="popup">
    <div class="popup-box">
        <p id="popup-texto"></p>
        <button id="btn1"></button>
        <button id="btn2"></button>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
