<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Taylorista</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔷 TOPO -->
<div class="topo">
  🏭 Simulador Taylorista
  <span id="dinheiro">💰 0</span>
</div>

<!-- 👤 INFO -->
<div class="perfil">
  <div>
    <strong id="cargo">Cargo: Operário</strong>
    <div class="barra-cargo">
      <div id="progressoCargo"></div>
    </div>
  </div>
  <div id="dia">📅 Dia 1 - Manhã</div>
</div>

<!-- 📜 HISTÓRICO -->
<div id="historico"></div>

<!-- 🎮 BOTÕES -->
<div class="acoes">
  <button onclick="trabalhar()">🔧 Trabalhar</button>
  <button onclick="descansar()">😴 Descansar</button>
  <button onclick="arriscar()">🎲 Arriscar</button>
  <button id="btnFabrica" class="bloqueado">🏭 Fábrica</button>
</div>

<!-- 📊 STATUS -->
<div class="status">

  <div class="barra">
    ⚙️ Eficiência
    <div class="bg"><div id="eficiencia"></div></div>
  </div>

  <div class="barra">
    ❤️ Saúde
    <div class="bg"><div id="saude"></div></div>
  </div>

  <div class="barra">
    🙂 Satisfação
    <div class="bg"><div id="satisfacao"></div></div>
  </div>

  <div class="barra">
    🏭 Fábrica
    <div class="bg"><div id="fabrica"></div></div>
  </div>

</div>

<!-- ⚠️ POPUP -->
<div id="popup" class="popup hidden">
  <div class="popup-box">
    <h2 id="popupTitulo"></h2>
    <p id="popupTexto"></p>

    <div class="opcoes">
      <button onclick="escolhaEvento(1)">Opção 1</button>
      <button onclick="escolhaEvento(2)">Opção 2</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
