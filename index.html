<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">

  <!-- RESPONSIVIDADE -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Simulador Taylorista</title>

  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOPO -->
<div class="topo">
  <span>🏭 Simulador Taylorista</span>
  <span id="money">💰 0</span>
</div>

<!-- BARRA DE CARGO -->
<div class="perfil">
  <div class="blocoBarra">
    <div class="barra">
      <div id="cargoBar" class="progresso"></div>
    </div>
  </div>
</div>

<!-- HISTÓRIA -->
<div id="historia"></div>

<!-- AÇÕES = + = -->
<div id="acoes-container">

  <!-- ESQUERDA -->
  <div id="opcoes-esquerda"></div>

  <!-- BOTÃO CENTRAL -->
  <div class="botao-centro">+</div>

  <!-- DIREITA -->
  <div id="opcoes-direita"></div>

</div>

<!-- BARRAS -->
<div class="barras">

  <div class="blocoBarra">
    <div class="barra">
      <div id="eficienciaBar" class="progresso"></div>
    </div>
  </div>

  <div class="blocoBarra">
    <div class="barra">
      <div id="saudeBar" class="progresso"></div>
    </div>
  </div>

  <div class="blocoBarra">
    <div class="barra">
      <div id="satisfacaoBar" class="progresso"></div>
    </div>
  </div>

  <div class="blocoBarra">
    <div class="barra">
      <div id="empresaBar" class="progresso"></div>
    </div>
  </div>

</div>

<!-- POPUP (PARA EVENTOS FUTUROS) -->
<div id="popup" class="popup hidden">
  <div class="popup-content">
    <h3 id="popupTitulo"></h3>
    <p id="popupTexto"></p>
    <div id="popupOpcoes"></div>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>
