<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Taylorista</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- TOPO -->
<header>
  <h1>🏭 Simulador Taylorista</h1>
  <div id="dinheiro">💰 0</div>
</header>

<!-- CARGO -->
<section class="cargo">
  <p id="cargo">Cargo: Operário</p>
  <div class="barra">
    <div id="barraCargo" class="fill"></div>
    <span id="txtCargo">0%</span>
  </div>
</section>

<!-- HISTÓRICO -->
<section id="historico"></section>

<!-- BOTÕES -->
<section class="acoes">

  <div class="linha">
    <button onclick="trabalhar()">🔧 Trabalhar</button>
    <button onclick="descansar()">😴 Descansar</button>
  </div>

  <div class="linha-centro">
    <button onclick="arriscar()">🎲 Arriscar</button>

    <button id="btnDia" onclick="passarDia()" class="plus">+</button>

    <button id="btnFabrica" disabled onclick="abrirFabrica()">🏭 Fábrica</button>
  </div>

</section>

<!-- BARRAS -->
<section class="status">

  <div class="barra-box">
    <label>⚙️ Eficiência</label>
    <div class="barra">
      <div id="eficiencia" class="fill"></div>
      <span id="txtEfi">50%</span>
    </div>
  </div>

  <div class="barra-box">
    <label>❤️ Saúde</label>
    <div class="barra">
      <div id="saude" class="fill"></div>
      <span id="txtSau">80%</span>
    </div>
  </div>

  <div class="barra-box">
    <label>🙂 Satisfação</label>
    <div class="barra">
      <div id="satisfacao" class="fill"></div>
      <span id="txtSat">60%</span>
    </div>
  </div>

  <div class="barra-box">
    <label>🏭 Fábrica</label>
    <div class="barra">
      <div id="fabrica" class="fill"></div>
      <span id="txtFab">0%</span>
    </div>
  </div>

</section>

<script src="script.js"></script>

</body>
</html>
