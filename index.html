<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador Taylorista</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🔷 TOPO -->
<header class="topo">
  <div>🏭 Simulador Taylorista</div>
  <div id="dinheiro">💰 0</div>
</header>

<!-- 👤 STATUS -->
<section class="status-topo">
  <div id="cargo">Operário (0%)</div>
</section>

<!-- 📜 HISTÓRICO CENTRAL -->
<main id="log" class="log"></main>

<!-- 📊 BARRAS -->
<section class="barras">
  <div class="barra">
    <span>Eficiência</span>
    <div><div id="eficiencia-bar"></div></div>
  </div>

  <div class="barra">
    <span>Saúde</span>
    <div><div id="saude-bar"></div></div>
  </div>

  <div class="barra">
    <span>Satisfação</span>
    <div><div id="satisfacao-bar"></div></div>
  </div>

  <div class="barra">
    <span>Fábrica</span>
    <div><div id="fabrica-bar"></div></div>
  </div>
</section>

<!-- 🎮 MENU INFERIOR -->
<footer class="menu">

  <button onclick="trabalhar()">🔧</button>
  <button onclick="descansar()">😴</button>

  <button class="btn-plus" onclick="passarDia()">+</button>

  <button onclick="arriscar()">🎲</button>
  <button id="btn-fabrica" onclick="abrirFabrica()">🏭</button>

</footer>

<!-- ⚠️ POPUP -->
<div id="popup" class="popup">
  <div class="popup-box">
    <p id="popup-texto"></p>
    <button id="btn1"></button>
    <button id="btn2"></button>
  </div>
</div>

<script src="script.js"></script>

</body>
    </html>
